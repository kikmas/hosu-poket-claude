<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>測量歩数グリッドシミュレーター</title>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --poke-red: #E3350D;
            --poke-blue: #316CB6;
            --poke-yellow: #FFCB05;
            --poke-dark: #2A2A2A;
            --poke-white: #FFFFFF;
            --poke-light-blue: #EBF3FC;
        }
        * { box-sizing:border-box; margin:0; padding:0; font-family:'M PLUS Rounded 1c',sans-serif; font-weight:700; user-select:none; }
        body {
            background-color:var(--poke-yellow);
            background-image:
                linear-gradient(45deg,#f0be02 25%,transparent 25%,transparent 75%,#f0be02 75%,#f0be02),
                linear-gradient(45deg,#f0be02 25%,transparent 25%,transparent 75%,#f0be02 75%,#f0be02);
            background-size:40px 40px; background-position:0 0,20px 20px;
            padding:10px; display:flex; flex-direction:column; align-items:center; min-height:100vh;
        }
        .container { width:100%; max-width:540px; background:var(--poke-white); border:4px solid var(--poke-dark); border-radius:16px; box-shadow:8px 8px 0 var(--poke-dark); overflow:hidden; display:flex; flex-direction:column; }
        header { background:var(--poke-red); color:var(--poke-white); padding:12px; text-align:center; border-bottom:4px solid var(--poke-dark); text-shadow:2px 2px 0 var(--poke-dark); font-size:1.1rem; letter-spacing:1px; }
        .content { padding:12px; display:flex; flex-direction:column; gap:12px; }

        /* Result Banner */
        .result-banner { background:var(--poke-dark); color:var(--poke-white); padding:12px; border-radius:8px; border:2px solid var(--poke-dark); }
        .result-title { font-size:.8rem; color:var(--poke-yellow); margin-bottom:6px; text-align:center; }
        .result-values { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
        .result-item { display:flex; flex-direction:column; background:rgba(255,255,255,.1); padding:6px; border-radius:6px; }
        .result-item span { font-size:.75rem; color:#ccc; margin-bottom:2px; }
        .result-values strong { color:var(--poke-red); background:white; padding:2px 6px; border-radius:4px; display:inline-block; }

        /* File / Camera section */
        .file-section { display:flex; gap:8px; }
        .file-btn, .camera-btn {
            flex:1; border:3px dashed var(--poke-blue); background:var(--poke-light-blue);
            border-radius:10px; padding:12px 8px; text-align:center; position:relative;
            cursor:pointer; font-size:.85rem; display:flex; flex-direction:column; align-items:center; gap:4px;
            transition:background .15s;
        }
        .file-btn:active, .camera-btn:active { background:#d0e8f8; }
        .file-btn input[type="file"] { position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%; }
        .file-btn .icon, .camera-btn .icon { font-size:1.6rem; }

        /* Camera Modal */
        .modal-overlay {
            display:none; position:fixed; inset:0; background:rgba(0,0,0,.88);
            z-index:1000; flex-direction:column; align-items:center; justify-content:center; gap:14px; padding:16px;
        }
        .modal-overlay.active { display:flex; }
        .camera-view-wrapper {
            position:relative; width:100%; max-width:460px; aspect-ratio:1/1;
            border:4px solid var(--poke-yellow); border-radius:16px; overflow:hidden; background:#000;
        }
        #cameraVideo { width:100%; height:100%; object-fit:cover; display:block; }
        /* Corner guides */
        .cam-corner {
            position:absolute; width:28px; height:28px;
            border-color:var(--poke-yellow); border-style:solid; border-width:0;
        }
        .cam-corner.tl { top:10px; left:10px; border-top-width:4px; border-left-width:4px; border-radius:6px 0 0 0; }
        .cam-corner.tr { top:10px; right:10px; border-top-width:4px; border-right-width:4px; border-radius:0 6px 0 0; }
        .cam-corner.bl { bottom:10px; left:10px; border-bottom-width:4px; border-left-width:4px; border-radius:0 0 0 6px; }
        .cam-corner.br { bottom:10px; right:10px; border-bottom-width:4px; border-right-width:4px; border-radius:0 0 6px 0; }
        /* Crosshair */
        .cam-cross { position:absolute; inset:0; pointer-events:none; }
        .cam-cross::before, .cam-cross::after { content:''; position:absolute; background:rgba(255,203,5,.3); }
        .cam-cross::before { top:50%; left:10%; right:10%; height:1px; transform:translateY(-50%); }
        .cam-cross::after  { left:50%; top:10%; bottom:10%; width:1px; transform:translateX(-50%); }

        .camera-label { color:#fff; font-size:.82rem; text-align:center; text-shadow:1px 1px 2px #000; max-width:380px; }
        .camera-controls { display:flex; gap:12px; align-items:center; }
        .btn-capture { width:72px; height:72px; border-radius:50%; background:#fff; border:5px solid var(--poke-yellow); box-shadow:0 0 0 3px var(--poke-dark); cursor:pointer; font-size:1.8rem; display:flex; align-items:center; justify-content:center; transition:transform .1s; }
        .btn-capture:active { transform:scale(.9); }
        .btn-cam-cancel, .btn-cam-switch {
            border:3px solid var(--poke-dark); border-radius:8px; padding:10px 16px;
            cursor:pointer; font-size:.9rem; box-shadow:2px 2px 0 var(--poke-dark);
        }
        .btn-cam-cancel { background:var(--poke-red); color:#fff; }
        .btn-cam-switch { background:var(--poke-blue); color:#fff; }

        #captureCanvas { display:none; }

        /* Guide */
        .guide-text { background:var(--poke-blue); color:#fff; padding:6px; text-align:center; font-size:.85rem; border-radius:6px; }

        /* Canvas */
        .canvas-container { width:100%; aspect-ratio:1/1; border:4px solid var(--poke-dark); border-radius:12px; background:#fff; overflow:hidden; position:relative; }
        canvas#mainCanvas { width:100%; height:100%; display:block; touch-action:none; cursor:grab; }

        /* Home button overlay */
        #homeBtn {
            position:absolute; bottom:10px; right:10px;
            width:44px; height:44px;
            background:var(--poke-yellow);
            border:3px solid var(--poke-dark);
            border-radius:10px;
            box-shadow:3px 3px 0 var(--poke-dark);
            font-size:1.3rem;
            display:flex; align-items:center; justify-content:center;
            cursor:pointer;
            opacity:0.88;
            transition:opacity .15s, transform .1s;
            z-index:10;
            touch-action:none;
        }
        #homeBtn:active { transform:scale(.92); opacity:1; }

        /* Controls */
        .control-panel { background:var(--poke-light-blue); border:3px solid var(--poke-blue); border-radius:12px; padding:12px; display:flex; flex-direction:column; gap:10px; }

        /* Row 1: 基準線の実測歩数 */
        .control-row-steps { display:flex; align-items:center; gap:8px; }
        .ctrl-label { background:var(--poke-blue); color:#fff; padding:6px 10px; border-radius:20px; font-size:.8rem; border:2px solid var(--poke-dark); box-shadow:2px 2px 0 var(--poke-dark); white-space:nowrap; flex-shrink:0; }
        .ctrl-spacer { flex:1; }
        .unit-text { font-size:.9rem; white-space:nowrap; flex-shrink:0; }

        /* Row 2: とうぶんすう — 2-column sub-grid */
        .control-row-div { display:flex; align-items:stretch; gap:8px; }
        .ctrl-label-div { background:var(--poke-blue); color:#fff; padding:6px 10px; border-radius:20px; font-size:.8rem; border:2px solid var(--poke-dark); box-shadow:2px 2px 0 var(--poke-dark); white-space:nowrap; flex-shrink:0; display:flex; align-items:center; }
        .div-inputs { display:grid; grid-template-columns:1fr 1fr; gap:6px; flex:1; }
        .div-cell { display:flex; flex-direction:column; align-items:center; gap:3px; }
        .div-cell-label { font-size:.72rem; color:var(--poke-dark); white-space:nowrap; }

        .poke-input { width:100%; max-width:90px; padding:6px 4px; border:3px solid var(--poke-dark); border-radius:8px; text-align:center; font-size:1.05rem; color:var(--poke-dark); background:#fff; }
        .poke-input:focus { outline:none; border-color:var(--poke-red); }
        .poke-input::placeholder { color:#ccc; font-size:.85rem; }

        .btn-reset { background:var(--poke-red); color:#fff; border:3px solid var(--poke-dark); border-radius:8px; padding:10px; cursor:pointer; box-shadow:2px 2px 0 var(--poke-dark); width:100%; font-size:.95rem; }
    </style>
</head>
<body>

<div class="container">
    <header>そくりょう ほすうシミュレーター</header>
    <div class="content">

        <div class="result-banner">
            <div class="result-title">【現在の計算結果】</div>
            <div class="result-values">
                <div class="result-item"><span>基準線 そうほすう</span><div><strong id="displayStepsX">- 歩</strong></div></div>
                <div class="result-item"><span>もう一方（自動計算）</span><div><strong id="displayStepsY">- 歩</strong></div></div>
                <div class="result-item"><span>基準線 1マスあたり</span><div><strong id="resX">- 歩</strong></div></div>
                <div class="result-item"><span>もう一方 1マスあたり</span><div><strong id="resY">- 歩</strong></div></div>
            </div>
        </div>

        <div class="file-section">
            <div class="file-btn">
                <span class="icon">🖼️</span>
                <span id="fileLabel">図面を読み込む</span>
                <input type="file" id="imageInput" accept="image/*">
            </div>
            <div class="camera-btn" id="cameraBtn">
                <span class="icon">📷</span>
                <span>カメラで撮影</span>
            </div>
        </div>

        <div class="guide-text" id="guideText">① まず図面を選択してください</div>

        <div class="canvas-container">
            <canvas id="mainCanvas"></canvas>
            <button id="homeBtn" title="作業位置に戻る">🏠</button>
        </div>

        <div class="control-panel">
            <!-- Row 1: 実測歩数 -->
            <div class="control-row-steps">
                <span class="ctrl-label">基準線の実測歩数</span>
                <span class="ctrl-spacer"></span>
                <input type="number" class="poke-input" id="stepsX" value="30" min="1" style="max-width:80px;">
                <span class="unit-text">歩</span>
            </div>

            <!-- Row 2: とうぶんすう -->
            <div class="control-row-div">
                <span class="ctrl-label-div">とうぶんすう</span>
                <div class="div-inputs">
                    <div class="div-cell">
                        <span class="div-cell-label">📏 基準線</span>
                        <input type="number" class="poke-input" id="divX" value="2" placeholder="未入力" min="1">
                    </div>
                    <div class="div-cell">
                        <span class="div-cell-label">📐 もう一方</span>
                        <input type="number" class="poke-input" id="divY" value="2" placeholder="未入力" min="1">
                    </div>
                </div>
            </div>

            <button class="btn-reset" id="resetPointsBtn">🔄 最初からやり直す / リセット</button>
        </div>

    </div>
</div>

<!-- Camera Modal -->
<div class="modal-overlay" id="cameraModal">
    <div class="camera-view-wrapper">
        <video id="cameraVideo" autoplay playsinline muted></video>
        <div class="cam-cross"></div>
        <div class="cam-corner tl"></div>
        <div class="cam-corner tr"></div>
        <div class="cam-corner bl"></div>
        <div class="cam-corner br"></div>
    </div>
    <div class="camera-label">📐 1:1（正方形）で撮影されます。角を枠に合わせてください</div>
    <div class="camera-controls">
        <button class="btn-cam-cancel" id="camCancelBtn">✕ 閉じる</button>
        <button class="btn-capture" id="captureBtn" title="撮影">📷</button>
        <button class="btn-cam-switch" id="camSwitchBtn">🔄 切替</button>
    </div>
</div>

<canvas id="captureCanvas"></canvas>

<script>
/* ════════════════════════════════════════
   State
════════════════════════════════════════ */
const state = {
    img: null,
    totalStepsX: 30,
    totalStepsY: 0,
    divisionsX: null,
    divisionsY: null,
    points: [],
    imgX: 0, imgY: 0, imgScale: 1,
    gridCorners: [{x:0,y:0},{x:800,y:0},{x:800,y:800},{x:0,y:800}],
    lineBPinIndex: 0, // 0=points[0]と③が線分B、1=points[1]と③が線分B
    stepsC: 0,        // 線分Cの自動計算歩数
    viewOffsetX: 0, viewOffsetY: 0, viewScale: 1.0,
    isDragging: false,
    draggedPointIndex: -1,
    startX: 0, startY: 0,
    pinchStartDist: 0,
    isPinching: false,
    hasMovedSignificantly: false
};

const canvas    = document.getElementById('mainCanvas');
const ctx       = canvas.getContext('2d');
const guideText = document.getElementById('guideText');
const CANVAS_SIZE = 800;

/* ════════════════════════════════════════
   Camera
════════════════════════════════════════ */
let cameraStream = null;
let facingMode   = 'environment';

async function openCamera() {
    document.getElementById('cameraModal').classList.add('active');
    await startStream();
}

async function startStream() {
    if (cameraStream) { cameraStream.getTracks().forEach(t => t.stop()); cameraStream = null; }
    try {
        cameraStream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: { ideal: facingMode }, width: { ideal: 1080 }, height: { ideal: 1080 } },
            audio: false
        });
        document.getElementById('cameraVideo').srcObject = cameraStream;
    } catch (err) {
        alert('カメラを起動できませんでした：' + err.message);
        closeCamera();
    }
}

function closeCamera() {
    if (cameraStream) { cameraStream.getTracks().forEach(t => t.stop()); cameraStream = null; }
    document.getElementById('cameraVideo').srcObject = null;
    document.getElementById('cameraModal').classList.remove('active');
}

async function switchCamera() {
    facingMode = (facingMode === 'environment') ? 'user' : 'environment';
    await startStream();
}

function capturePhoto() {
    const video = document.getElementById('cameraVideo');
    const vw = video.videoWidth, vh = video.videoHeight;
    if (!vw || !vh) return;

    /* 1:1 center crop */
    const size = Math.min(vw, vh);
    const sx = Math.floor((vw - size) / 2);
    const sy = Math.floor((vh - size) / 2);

    const capCvs = document.getElementById('captureCanvas');
    capCvs.width = capCvs.height = size;
    capCvs.getContext('2d').drawImage(video, sx, sy, size, size, 0, 0, size, size);

    const img = new Image();
    img.onload = () => {
        state.img = img;
        document.getElementById('fileLabel').textContent = '📷 カメラ撮影済み';
        resetPoints();
        closeCamera();
    };
    img.src = capCvs.toDataURL('image/jpeg', 0.92);
}

/* ════════════════════════════════════════
   Init
════════════════════════════════════════ */
function init() {
    canvas.width = canvas.height = CANVAS_SIZE;

    document.getElementById('imageInput').addEventListener('change', handleFile);
    document.getElementById('stepsX').addEventListener('input', updateValues);
    document.getElementById('divX').addEventListener('input', updateValues);
    document.getElementById('divY').addEventListener('input', updateValues);
    document.getElementById('resetPointsBtn').addEventListener('click', resetPoints);
    document.getElementById('homeBtn').addEventListener('click', returnToWork);

    document.getElementById('cameraBtn').addEventListener('click', openCamera);
    document.getElementById('camCancelBtn').addEventListener('click', closeCamera);
    document.getElementById('captureBtn').addEventListener('click', capturePhoto);
    document.getElementById('camSwitchBtn').addEventListener('click', switchCamera);

    canvas.addEventListener('pointerdown',   handlePointerDown);
    canvas.addEventListener('pointermove',   handlePointerMove);
    canvas.addEventListener('pointerup',     handlePointerUp);
    canvas.addEventListener('pointercancel', handlePointerUp);
    canvas.addEventListener('wheel', handleWheel, { passive: false });
    canvas.addEventListener('touchstart', e => { if (e.touches.length > 1) e.preventDefault(); }, { passive: false });
    canvas.addEventListener('touchmove',  e => e.preventDefault(), { passive: false });

    updateValues();
}

/* ════════════════════════════════════════
   File
════════════════════════════════════════ */
function handleFile(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
        const img = new Image();
        img.onload = () => {
            state.img = img;
            const n = file.name;
            document.getElementById('fileLabel').textContent = '選択中: ' + (n.length > 12 ? n.slice(0,12)+'…' : n);
            resetPoints();
        };
        img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
}

/* ════════════════════════════════════════
   Grid geometry
════════════════════════════════════════ */
function fitBaseLine() {
    const [p1, p2] = [state.points[0], state.points[1]];
    const dx = p2.x - p1.x, dy = p2.y - p1.y;
    const len = Math.hypot(dx, dy);
    if (!len) return;
    const ang = Math.atan2(dy, dx);
    const px = Math.sin(ang)*len, py = -Math.cos(ang)*len;
    state.gridCorners[3] = { x: p1.x,    y: p1.y };
    state.gridCorners[2] = { x: p2.x,    y: p2.y };
    state.gridCorners[0] = { x: p1.x+px, y: p1.y+py };
    state.gridCorners[1] = { x: p2.x+px, y: p2.y+py };
}

function fitThirdPoint() {
    const p3 = state.points[2];
    const dx = state.gridCorners[2].x - state.gridCorners[3].x;
    const dy = state.gridCorners[2].y - state.gridCorners[3].y;
    const len = Math.hypot(dx, dy);
    if (!len) return;
    const ang = Math.atan2(dy, dx);
    const px = Math.sin(ang)*len, py = -Math.cos(ang)*len;
    // ③に近いのはgridCorners[3](=p1側) と gridCorners[2](=p2側) どちらか
    const dLT = Math.hypot(p3.x - (state.gridCorners[3].x+px), p3.y - (state.gridCorners[3].y+py));
    const dRT = Math.hypot(p3.x - (state.gridCorners[2].x+px), p3.y - (state.gridCorners[2].y+py));
    if (dLT < dRT) {
        // ③はp1(index 0)側の上コーナー → gridCorners[0]に直接セット
        state.gridCorners[0] = { x: p3.x,      y: p3.y };
        state.gridCorners[1] = { x: p3.x + dx,  y: p3.y + dy };
        state.lineBPinIndex = 0; // 線分Bはp1(points[0])と③を結ぶ
    } else {
        // ③はp2(index 1)側の上コーナー → gridCorners[1]に直接セット
        state.gridCorners[1] = { x: p3.x,      y: p3.y };
        state.gridCorners[0] = { x: p3.x - dx,  y: p3.y - dy };
        state.lineBPinIndex = 1; // 線分Bはp2(points[1])と③を結ぶ
    }
}

/* ════════════════════════════════════════
   Calculation
════════════════════════════════════════ */
function calculateAutomaticSteps() {
    if (state.points.length < 3) { state.totalStepsY = 0; return; }
    const [p1, p2, p3] = state.points;
    const bLen = Math.hypot(p2.x-p1.x, p2.y-p1.y);
    if (!bLen) return;
    const nx = -(p2.y-p1.y)/bLen, ny = (p2.x-p1.x)/bLen;
    const depth = Math.abs((p3.x-p1.x)*nx + (p3.y-p1.y)*ny);
    state.totalStepsY = state.totalStepsX * (depth / bLen);
}

function updateValues() {
    state.totalStepsX = parseFloat(document.getElementById('stepsX').value) || 1;
    const dxv = document.getElementById('divX').value;
    const dyv = document.getElementById('divY').value;
    state.divisionsX = dxv !== '' ? parseInt(dxv) : null;
    state.divisionsY = dyv !== '' ? parseInt(dyv) : null;
    calculateAutomaticSteps();

    document.getElementById('displayStepsX').textContent = state.totalStepsX.toFixed(1) + ' 歩';
    if (state.points.length >= 3) {
        document.getElementById('displayStepsY').textContent = state.totalStepsY.toFixed(1) + ' 歩';
        document.getElementById('resX').textContent = state.divisionsX ? (state.totalStepsX/state.divisionsX).toFixed(1)+'歩' : '- 歩';
        document.getElementById('resY').textContent = state.divisionsY ? (state.totalStepsY/state.divisionsY).toFixed(1)+'歩' : '- 歩';
    } else {
        document.getElementById('displayStepsY').textContent = '3点指定後に計算';
        document.getElementById('resX').textContent = '- 歩';
        document.getElementById('resY').textContent = '- 歩';
    }
    draw();
}

/* ════════════════════════════════════════
   Return to Work (home button)
════════════════════════════════════════ */
function returnToWork() {
    if (!state.img) return;

    if (state.points.length === 0) {
        // 画像全体が収まるデフォルト表示に戻す
        state.viewOffsetX = 0;
        state.viewOffsetY = 0;
        state.viewScale   = 1.0;
        draw();
        return;
    }

    // 配置済みのピン全体を囲むBounding Boxを計算
    const xs = state.points.map(p => p.x);
    const ys = state.points.map(p => p.y);
    const minX = Math.min(...xs), maxX = Math.max(...xs);
    const minY = Math.min(...ys), maxY = Math.max(...ys);

    // gridCornersも含めてBBを広げる（グリッド外枠が見えるように）
    const allPts = [...state.points, ...state.gridCorners];
    const axs = allPts.map(p => p.x), ays = allPts.map(p => p.y);
    const bbMinX = Math.min(...axs), bbMaxX = Math.max(...axs);
    const bbMinY = Math.min(...ays), bbMaxY = Math.max(...ays);

    const bbW = bbMaxX - bbMinX || 100;
    const bbH = bbMaxY - bbMinY || 100;

    // パディングを加えてキャンバス内に収まるスケールを算出
    const padding = 60;
    const scaleX = (CANVAS_SIZE - padding * 2) / bbW;
    const scaleY = (CANVAS_SIZE - padding * 2) / bbH;
    const newScale = Math.max(0.5, Math.min(10, Math.min(scaleX, scaleY)));

    // BB中心をCanvasの中心に合わせるオフセットを計算
    const bbCX = (bbMinX + bbMaxX) / 2;
    const bbCY = (bbMinY + bbMaxY) / 2;
    state.viewScale   = newScale;
    state.viewOffsetX = CANVAS_SIZE / 2 - bbCX * newScale;
    state.viewOffsetY = CANVAS_SIZE / 2 - bbCY * newScale;

    draw();
}


function resetPoints() {
    state.points = [];
    state.lineBPinIndex = 0;
    state.gridCorners = [{x:0,y:0},{x:CANVAS_SIZE,y:0},{x:CANVAS_SIZE,y:CANVAS_SIZE},{x:0,y:CANVAS_SIZE}];
    state.viewOffsetX = state.viewOffsetY = 0;
    state.viewScale = 1.0;

    if (state.img) {
        const mx = Math.max(state.img.width, state.img.height);
        state.imgScale = CANVAS_SIZE / mx;
        state.imgX = (CANVAS_SIZE - state.img.width  * state.imgScale) / 2;
        state.imgY = (CANVAS_SIZE - state.img.height * state.imgScale) / 2;
        guideText.textContent = "② 基準線（底辺）の『左下の角』をタップしてください";
        guideText.style.background = 'var(--poke-blue)';
    } else {
        guideText.textContent = '① まず図面を選択してください';
        guideText.style.background = 'var(--poke-red)';
    }
    updateValues();
}

/* ════════════════════════════════════════
   Draw
════════════════════════════════════════ */
function drawTextWithStroke(text, x, y, fontSize, opacity) {
    opacity = opacity === undefined ? 1 : opacity;
    ctx.save();
    ctx.globalAlpha = opacity;
    ctx.font = '900 ' + fontSize + 'px "M PLUS Rounded 1c",sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.strokeStyle = '#2A2A2A';
    ctx.lineWidth = 4;
    ctx.strokeText(text, x, y);
    ctx.fillStyle = '#FFFFFF';
    ctx.fillText(text, x, y);
    ctx.restore();
}

function draw() {
    ctx.fillStyle = '#FFF';
    ctx.fillRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);

    ctx.save();
    ctx.translate(state.viewOffsetX, state.viewOffsetY);
    ctx.scale(state.viewScale, state.viewScale);

    if (!state.img) {
        ctx.restore();
        drawTextWithStroke('図面が読み込まれていません', CANVAS_SIZE/2, CANVAS_SIZE/2, 28);
        return;
    }

    /* Image */
    ctx.save();
    ctx.translate(state.imgX, state.imgY);
    ctx.scale(state.imgScale, state.imgScale);
    ctx.drawImage(state.img, 0, 0);
    ctx.restore();

    /* Baseline highlight */
    if (state.points.length >= 2) {
        ctx.save();
        ctx.beginPath();
        ctx.moveTo(state.points[0].x, state.points[0].y);
        ctx.lineTo(state.points[1].x, state.points[1].y);
        ctx.strokeStyle = '#00FF66';
        ctx.lineWidth = 6 / state.viewScale;
        ctx.lineCap = 'round';
        ctx.shadowBlur = 4;
        ctx.shadowColor = '#000';
        ctx.stroke();
        ctx.restore();
    }

    /* Grid */
    if (state.points.length >= 2) {
        const divX = state.divisionsX || 1;
        const divY = state.divisionsY || 1;
        const [lt, rt, rb, lb] = [state.gridCorners[0], state.gridCorners[1], state.gridCorners[2], state.gridCorners[3]];

        function getPt(u, v) {
            const tx = lt.x + u*(rt.x-lt.x),  ty = lt.y + u*(rt.y-lt.y);
            const bx = lb.x + u*(rb.x-lb.x),  by = lb.y + u*(rb.y-lb.y);
            return { x: tx + v*(bx-tx), y: ty + v*(by-ty) };
        }

        const showInner = (state.divisionsX !== null && state.divisionsY !== null);
        const dense = (divX > 25 || divY > 25);

        /* Lines */
        ctx.save();
        ctx.strokeStyle = '#316CB6';
        ctx.lineWidth = 3.5 / state.viewScale;
        for (let i = 0; i <= divX; i++) {
            if (!showInner && i > 0 && i < divX) continue;
            ctx.beginPath();
            const pT = getPt(i/divX, 0), pB = getPt(i/divX, 1);
            ctx.moveTo(pT.x, pT.y); ctx.lineTo(pB.x, pB.y); ctx.stroke();
        }
        for (let j = 0; j <= divY; j++) {
            if (!showInner && j > 0 && j < divY) continue;
            ctx.beginPath();
            const pL = getPt(0, j/divY), pR = getPt(1, j/divY);
            ctx.moveTo(pL.x, pL.y); ctx.lineTo(pR.x, pR.y); ctx.stroke();
        }
        ctx.restore();

        /* Pins & Labels */
        if (showInner) {
            const showLabels = (divX <= 15 && divY <= 15);

            /* Collect pin positions */
            const pinPts = [];
            if (!dense) {
                /* All intersections */
                for (let i = 0; i <= divX; i++) {
                    for (let j = 0; j <= divY; j++) {
                        pinPts.push(getPt(i/divX, j/divY));
                    }
                }
            } else {
                /* Boundary only */
                for (let i = 0; i <= divX; i++) {
                    pinPts.push(getPt(i/divX, 0));
                    pinPts.push(getPt(i/divX, 1));
                }
                for (let j = 1; j < divY; j++) {
                    pinPts.push(getPt(0, j/divY));
                    pinPts.push(getPt(1, j/divY));
                }
            }

            ctx.save();
            pinPts.forEach(pt => {
                ctx.beginPath();
                ctx.arc(pt.x, pt.y, (dense ? 5 : 6)/state.viewScale, 0, Math.PI*2);
                ctx.fillStyle = '#E3350D';
                ctx.fill();
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = (dense ? 1.5 : 2)/state.viewScale;
                ctx.stroke();
            });
            ctx.restore();

            /* Cell labels (sparse only) */
            if (showLabels) {
                for (let i = 0; i < divX; i++) {
                    for (let j = 0; j < divY; j++) {
                        const pC = getPt((i+0.5)/divX, (j+0.5)/divY);
                        const p0 = getPt(i/divX, j/divY);
                        const p1 = getPt((i+1)/divX, (j+1)/divY);
                        const diag = Math.hypot(p1.x-p0.x, p1.y-p0.y);
                        const fSz = Math.max(12/state.viewScale, Math.min(60/state.viewScale, diag*0.18));
                        drawTextWithStroke((i+1)+'-'+(j+1), pC.x, pC.y, fSz, 0.55);
                    }
                }
            }
        }
    }

    /* Control pins + extra lines */
    ctx.save();
    const pinColors = ['#E3350D','#e67e22','#9b59b6','#00aaff'];

    /* 線分B：fitThirdPointで決定したpinIndexと③を結ぶ */
    if (state.points.length >= 3) {
        const p3 = state.points[2];
        const lineBStart   = state.points[state.lineBPinIndex];
        const lineBFreeEnd = state.points[state.lineBPinIndex === 0 ? 1 : 0];

        // 線分B描画
        ctx.beginPath();
        ctx.moveTo(lineBStart.x, lineBStart.y);
        ctx.lineTo(p3.x, p3.y);
        ctx.strokeStyle = '#9b59b6';
        ctx.lineWidth = 4 / state.viewScale;
        ctx.setLineDash([8/state.viewScale, 5/state.viewScale]);
        ctx.lineCap = 'round';
        ctx.stroke();
        ctx.setLineDash([]);

        /* 線分C：④ と lineBFreeEnd を結ぶ線 + c値ラベル */
        if (state.points.length >= 4) {
            const p4 = state.points[3];
            const freeEnd = lineBFreeEnd;

            // 線分C 描画
            ctx.beginPath();
            ctx.moveTo(freeEnd.x, freeEnd.y);
            ctx.lineTo(p4.x, p4.y);
            ctx.strokeStyle = '#00aaff';
            ctx.lineWidth = 4 / state.viewScale;
            ctx.setLineDash([8/state.viewScale, 5/state.viewScale]);
            ctx.lineCap = 'round';
            ctx.stroke();
            ctx.setLineDash([]);

            // c値を計算（線分Aのピクセル長を基準に逆算）
            const lineALen = Math.hypot(
                state.points[1].x - state.points[0].x,
                state.points[1].y - state.points[0].y
            );
            const lineCLen = Math.hypot(p4.x - freeEnd.x, p4.y - freeEnd.y);
            const cValue = lineALen > 0
                ? (lineCLen / lineALen) * state.totalStepsX
                : 0;

            // ラベルを線分Cの中点に、線分Cに平行に描画
            const mx = (freeEnd.x + p4.x) / 2;
            const my = (freeEnd.y + p4.y) / 2;
            const angle = Math.atan2(p4.y - freeEnd.y, p4.x - freeEnd.x);

            // テキストが常に上向き（読みやすい方向）になるよう角度補正
            const displayAngle = (angle > Math.PI/2 || angle < -Math.PI/2)
                ? angle + Math.PI : angle;

            const fontSize = 18 / state.viewScale;
            const label = cValue.toFixed(1) + ' 歩';

            // 背景pill
            ctx.save();
            ctx.translate(mx, my);
            ctx.rotate(displayAngle);
            const pad = 6 / state.viewScale;
            ctx.font = '900 ' + fontSize + 'px "M PLUS Rounded 1c",sans-serif';
            const tw = ctx.measureText(label).width;
            const bw = tw + pad * 2;
            const bh = fontSize + pad * 2;
            ctx.fillStyle = '#00aaff';
            ctx.strokeStyle = '#2A2A2A';
            ctx.lineWidth = 2 / state.viewScale;
            const r = bh / 2;
            ctx.beginPath();
            ctx.moveTo(-bw/2 + r, -bh/2);
            ctx.arcTo( bw/2, -bh/2,  bw/2,  bh/2, r);
            ctx.arcTo( bw/2,  bh/2, -bw/2,  bh/2, r);
            ctx.arcTo(-bw/2,  bh/2, -bw/2, -bh/2, r);
            ctx.arcTo(-bw/2, -bh/2,  bw/2, -bh/2, r);
            ctx.closePath();
            ctx.fill();
            ctx.stroke();

            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillStyle = '#ffffff';
            ctx.shadowColor = '#005588';
            ctx.shadowBlur = 2;
            ctx.fillText(label, 0, 0);
            ctx.restore();
        }
    }

    state.points.forEach((pt, i) => {
        ctx.beginPath();
        ctx.arc(pt.x, pt.y, 14/state.viewScale, 0, Math.PI*2);
        ctx.fillStyle = pinColors[i];
        ctx.fill();
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 3/state.viewScale;
        ctx.stroke();

        ctx.beginPath();
        ctx.arc(pt.x, pt.y, 22/state.viewScale, 0, Math.PI*2);
        ctx.strokeStyle = 'rgba(255,255,255,0.4)';
        ctx.lineWidth = 1.5/state.viewScale;
        ctx.stroke();

        drawTextWithStroke(i+1, pt.x, pt.y - 26/state.viewScale, 18/state.viewScale);
    });
    ctx.restore();

    ctx.restore(); /* end viewTransform */
}

/* ════════════════════════════════════════
   Wheel Zoom
════════════════════════════════════════ */
function handleWheel(e) {
    e.preventDefault();
    if (!state.img) return;
    const rect = canvas.getBoundingClientRect();
    const mx = (e.clientX - rect.left) * (CANVAS_SIZE/rect.width);
    const my = (e.clientY - rect.top)  * (CANVAS_SIZE/rect.height);
    const zf = e.deltaY < 0 ? 1.1 : 1/1.1;
    const ns = Math.max(0.5, Math.min(10, state.viewScale * zf));
    state.viewOffsetX = mx - (mx - state.viewOffsetX) * (ns/state.viewScale);
    state.viewOffsetY = my - (my - state.viewOffsetY) * (ns/state.viewScale);
    state.viewScale = ns;
    draw();
}

/* ════════════════════════════════════════
   Pointer Events
════════════════════════════════════════ */
let activeTouches = [];

function canvasCoords(e) {
    const rect = canvas.getBoundingClientRect();
    const cx = (e.clientX - rect.left) * (CANVAS_SIZE/rect.width);
    const cy = (e.clientY - rect.top)  * (CANVAS_SIZE/rect.height);
    return { cx, cy,
        tx: (cx - state.viewOffsetX)/state.viewScale,
        ty: (cy - state.viewOffsetY)/state.viewScale };
}

function handlePointerDown(e) {
    if (!state.img) return;
    activeTouches = activeTouches.filter(t => t.pointerId !== e.pointerId);
    activeTouches.push({ pointerId: e.pointerId, x: e.clientX, y: e.clientY });

    state.isDragging = true;
    state.hasMovedSignificantly = false;
    state.draggedPointIndex = -1;

    const { tx, ty } = canvasCoords(e);

    if (activeTouches.length === 1) {
        for (let i = 0; i < state.points.length; i++) {
            if (Math.hypot(tx - state.points[i].x, ty - state.points[i].y) < 25/state.viewScale) {
                state.draggedPointIndex = i;
                canvas.style.cursor = 'grabbing';
                canvas.setPointerCapture(e.pointerId);
                return;
            }
        }
        state.startX = e.clientX - state.viewOffsetX;
        state.startY = e.clientY - state.viewOffsetY;
        state.isPinching = false;
        canvas.style.cursor = 'move';
    } else if (activeTouches.length === 2) {
        state.isPinching = true;
        state.draggedPointIndex = -1;
        state.pinchStartDist = Math.hypot(
            activeTouches[0].x - activeTouches[1].x,
            activeTouches[0].y - activeTouches[1].y);
    }
    canvas.setPointerCapture(e.pointerId);
}

function handlePointerMove(e) {
    if (!state.isDragging) return;
    activeTouches = activeTouches.map(t =>
        t.pointerId === e.pointerId ? { pointerId: e.pointerId, x: e.clientX, y: e.clientY } : t);

    const { tx, ty } = canvasCoords(e);

    if (state.draggedPointIndex !== -1 && activeTouches.length === 1) {
        state.points[state.draggedPointIndex] = { x: tx, y: ty };
        if ((state.draggedPointIndex === 0 || state.draggedPointIndex === 1) && state.points.length >= 2) fitBaseLine();
        if (state.points.length >= 3) fitThirdPoint();
        state.hasMovedSignificantly = true;
        updateValues();
        return;
    }

    const rect = canvas.getBoundingClientRect();
    if (state.isPinching && activeTouches.length === 2) {
        const dist = Math.hypot(
            activeTouches[0].x - activeTouches[1].x,
            activeTouches[0].y - activeTouches[1].y);
        if (state.pinchStartDist > 0) {
            const ns = Math.max(0.5, Math.min(10, state.viewScale * dist/state.pinchStartDist));
            const midX = ((activeTouches[0].x + activeTouches[1].x)/2 - rect.left) * (CANVAS_SIZE/rect.width);
            const midY = ((activeTouches[0].y + activeTouches[1].y)/2 - rect.top)  * (CANVAS_SIZE/rect.width);
            state.viewOffsetX = midX - (midX - state.viewOffsetX) * (ns/state.viewScale);
            state.viewOffsetY = midY - (midY - state.viewOffsetY) * (ns/state.viewScale);
            state.viewScale = ns;
            state.pinchStartDist = dist;
            state.hasMovedSignificantly = true;
            draw();
        }
    } else if (!state.isPinching && activeTouches.length === 1) {
        const mx = e.clientX - (state.startX + state.viewOffsetX);
        const my = e.clientY - (state.startY + state.viewOffsetY);
        if (Math.hypot(mx, my) > 5) state.hasMovedSignificantly = true;
        state.viewOffsetX = e.clientX - state.startX;
        state.viewOffsetY = e.clientY - state.startY;
        draw();
    }
}

function handlePointerUp(e) {
    if (!state.isDragging) return;
    canvas.releasePointerCapture(e.pointerId);
    canvas.style.cursor = 'grab';

    if (state.draggedPointIndex !== -1) {
        state.draggedPointIndex = -1;
        activeTouches = activeTouches.filter(t => t.pointerId !== e.pointerId);
        if (!activeTouches.length) state.isDragging = false;
        return;
    }

    if (!state.hasMovedSignificantly && !state.isPinching && activeTouches.length === 1) {
        const { tx, ty } = canvasCoords(e);
        if (state.points.length < 4) {
            state.points.push({ x: tx, y: ty });
            if (state.points.length === 1) {
                guideText.textContent = "③ 基準線（底辺）の『右下の角』をタップしてください";
                guideText.style.background = '#e67e22';
            } else if (state.points.length === 2) {
                fitBaseLine();
                guideText.textContent = "④ 土地の『上の角』をタップ";
                guideText.style.background = '#9b59b6';
            } else if (state.points.length === 3) {
                fitThirdPoint();
                guideText.textContent = "⑤ ④点目をタップしてください（線分Bの自由端と結線されます）";
                guideText.style.background = '#0077cc';
            } else {
                guideText.textContent = '🎉 完了！すべてのピン（1〜4）をドラッグして微調整可能です';
                guideText.style.background = '#27ae60';
            }
            updateValues();
        }
    }

    activeTouches = activeTouches.filter(t => t.pointerId !== e.pointerId);
    if (!activeTouches.length) { state.isDragging = false; state.isPinching = false; }
}

window.onload = init;
</script>
</body>
</html>
